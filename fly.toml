# fly.toml — deploy your own SalonRunner MCP server.
# Rename `app` to something unique, then: fly launch --no-deploy && fly deploy
app = "salonrunner-mcp"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8787"
  # PUBLIC_URL is set automatically below via [http_service]; override if using a custom domain.

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"   # scale to zero between uses to save money
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
